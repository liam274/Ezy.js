<!DOCTYPE html><!--Generated by DeepSeek-->
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ezy.js 主题切换示例</title>
    <style>
        /* 基础重置，让主题切换效果更明显 */
        body {
            margin: 0;
            min-height: 100vh;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        /* 示例中定义的实用类样式由框架动态生成，此处无需手动写 */
    </style>
</head>

<body>
    <div id="app"></div>

    <script type="importmap">
        {
            "imports": {
                "ezy": "../../Ezy.js/main.js"
            }
        }
    </script>

    <script type="module">
        import * as Ezy from 'ezy';
        import { render } from 'ezy';

        // 1️⃣ 定义页面数据，使用主题前缀类
        const pageData = {
            config: {
                // 可选：全局配置
                escapeHTML: false,
                urlFilter: {
                    rules: [".*"],
                    confirmer: () => true,
                    reporter: () => undefined
                }
            },
            component: {
                container: {
                    tag: 'div',
                    type: [
                        'display-flex',               // 通用布局类（无主题前缀）
                        'display-flex-col',
                        'align-items-center',
                        'justify-content-center',
                        // 亮色主题样式
                        'light:bg-clr-yellow',
                        'light:clr-blue',
                        // 暗色主题样式
                        'dark:bg-clr-gray',
                        'dark:clr-white'
                    ],
                    content: `
                        <h1 class="text-3xl font-bold mb-4">🌓 Ezy.js 主题切换</h1>
                        <p class="mb-6">当前主题由框架内置主题系统控制，点击下方按钮切换。</p>
                        <div class="flex gap-4">
                            <button id="lightBtn" type="button" class="px-4 py-2 rounded light:bg-gray-200 light:text-black dark:bg-gray-700 dark:text-white transition">🌞 亮色模式</button>
                            <button id="darkBtn" type="button" class="px-4 py-2 rounded light:bg-gray-200 light:text-black dark:bg-gray-700 dark:text-white transition">🌙 暗色模式</button>
                        </div>
                    `,
                    // 为按钮绑定事件（可选，也可用原生监听）
                    events: {
                        click: {
                            listener: [
                                (e) => {
                                    // 事件代理：根据 id 判断切换主题
                                    const target = e.target.closest('button');
                                    if (target?.id === 'lightBtn') {
                                        app.setTheme(['light']);
                                    } else if (target?.id === 'darkBtn') {
                                        app.setTheme(['dark']);
                                    }
                                }
                            ]
                        }
                    }
                }
            }
        };

        // 2️⃣ 初始化渲染器，挂载到 #app
        const app = new render('#app', pageData);
        // 保存到全局，便于控制台调试
        window.app = app;

        // 可选：如果希望默认就加载暗色主题，可以在渲染完成后调用一次
        // app.setTheme(['dark']);   // 取消注释则默认暗色
    </script>
</body>

</html>
